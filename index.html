<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>00:00:00 — Stopwatch</title>
  <link rel="icon" href="https://www.svgrepo.com/show/520498/clock.svg" type="image/x-icon">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #ffffff;
      color: #111111;
      font-family: 'Courier New', Courier, monospace;
      overflow-x: hidden;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f0f0f; color: #eeeeee; }
    }

    #sw {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1rem;
    }

    #time {
      font-size: clamp(3rem, 16vw, 12rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      text-align: center;
      width: 100%;
      white-space: nowrap;
    }

    #controls { display: flex; gap: 16px; margin-top: 2.5rem; }

    .btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      min-width: 100px;
    }
    .btn:active { transform: scale(0.97); }

    .btn.primary { background: #111111; color: #ffffff; border: 1px solid #111111; }
    .btn.primary:hover { opacity: 0.75; }
    .btn.secondary { background: transparent; color: #111111; border: 1.5px solid #111111; }
    .btn.secondary:hover { background: rgba(0,0,0,0.06); }
    .btn.ghost { background: transparent; color: #888; border: 1.5px solid #cccccc; min-width: auto; padding: 5px 14px; font-size: 11px; }
    .btn.ghost:hover { background: rgba(0,0,0,0.04); color: #111; }
    .btn.add { background: #111111; color: #fff; border: 1px solid #111111; min-width: auto; padding: 8px 20px; font-size: 12px; }
    .btn.add:hover { opacity: 0.75; }

    @media (prefers-color-scheme: dark) {
      .btn.primary { background: #eeeeee; color: #0f0f0f; border-color: #eeeeee; }
      .btn.primary:hover { opacity: 0.8; }
      .btn.secondary { color: #eeeeee; border-color: #eeeeee; }
      .btn.secondary:hover { background: rgba(255,255,255,0.08); }
      .btn.ghost { color: #666; border-color: #333; }
      .btn.ghost:hover { background: rgba(255,255,255,0.05); color: #eee; }
      .btn.add { background: #eeeeee; color: #0f0f0f; border-color: #eeeeee; }
    }

    /* delete row btn */
    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .btn-del:hover { color: #e74c3c; background: rgba(231,76,60,0.08); }

    #status {
      position: fixed; top: 1.5rem; right: 1.5rem;
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(0,0,0,0.15); transition: background 0.3s;
    }
    @media (prefers-color-scheme: dark) { #status { background: rgba(255,255,255,0.15); } }
    #status.running { background: #1D9E75; }

    #hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 12px; letter-spacing: 0.06em; color: #aaaaaa; white-space: nowrap;
    }

    /* ── History ── */
    #history-section { width: 100%; max-width: 700px; margin: 0 auto; padding: 0 1.5rem 5rem; }

    .section-divider {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid rgba(0,0,0,0.1); padding-top: 2rem; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) { .section-divider { border-color: rgba(255,255,255,0.1); } }

    .section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }

    #total-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 0; border-bottom: 1px solid rgba(0,0,0,0.08); margin-bottom: 0.5rem;
    }
    @media (prefers-color-scheme: dark) { #total-row { border-color: rgba(255,255,255,0.08); } }

    .total-label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
    #total-time { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 400; letter-spacing: -0.01em; }
    .total-right { display: flex; align-items: center; gap: 14px; }

    .run-row {
      display: grid;
      grid-template-columns: 2rem 1fr auto auto;
      gap: 0 1rem;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: clamp(0.8rem, 2vw, 1rem);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    @media (prefers-color-scheme: dark) { .run-row { border-color: rgba(255,255,255,0.05); } }

    .run-index { color: #aaa; font-size: 11px; text-align: right; }
    .run-range { color: #888; font-size: 0.85em; }
    .run-duration { font-size: clamp(0.9rem, 2.5vw, 1.15rem); text-align: right; white-space: nowrap; }

    #empty-msg { display: none; font-size: 13px; color: #aaa; letter-spacing: 0.05em; padding: 1.2rem 0 0.5rem; }

    /* ── Manual entry ── */
    #manual-section { margin-top: 1rem; }

    .manual-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr) auto;
      gap: 10px;
      align-items: end;
      margin-top: 1rem;
    }

    .manual-field { display: flex; flex-direction: column; gap: 5px; }

    .manual-field label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
    }

    .manual-field input {
      font-family: inherit;
      font-size: clamp(0.85rem, 2vw, 1rem);
      padding: 8px 10px;
      border-radius: 6px;
      border: 1.5px solid rgba(0,0,0,0.15);
      background: transparent;
      color: #111111;
      width: 100%;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .manual-field input::-webkit-outer-spin-button,
    .manual-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .manual-field input:focus { border-color: #111111; }

    @media (prefers-color-scheme: dark) {
      .manual-field input { border-color: rgba(255,255,255,0.15); color: #eeeeee; }
      .manual-field input:focus { border-color: #eeeeee; }
    }

    #manual-error {
      font-size: 11px;
      color: #e74c3c;
      margin-top: 8px;
      min-height: 16px;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .manual-grid { grid-template-columns: repeat(3, 1fr); }
      .manual-grid .btn.add { grid-column: 1 / -1; width: 100%; }
    }
  </style>
</head>
<body>

  <div id="sw">
    <div id="status"></div>
    <div id="time">00:00:00</div>
    <div id="controls">
      <button class="btn primary" id="startStop">Start</button>
      <button class="btn secondary" id="reset">Reset</button>
    </div>
    <div id="hint">space — start / pause &nbsp;&nbsp; r — reset</div>
  </div>

  <div id="history-section">

    <!-- Run history -->
    <div class="section-divider">
      <span class="section-label">Run History</span>
    </div>
    <div id="total-row">
      <span class="total-label">Total Runtime</span>
      <div class="total-right">
        <div id="total-time">00:00:00</div>
        <button class="btn ghost" id="clearAll">Clear all</button>
      </div>
    </div>
    <div id="run-list"></div>
    <div id="empty-msg">No data to show.</div>

    <!-- Manual entry -->
    <div id="manual-section">
      <div class="section-divider" style="margin-top:2rem">
        <span class="section-label">Add Time Manually</span>
      </div>
      <div class="manual-grid">
        <div class="manual-field">
          <label>Hours</label>
          <input type="number" id="m-hours" min="0" max="99" placeholder="00" />
        </div>
        <div class="manual-field">
          <label>Minutes</label>
          <input type="number" id="m-minutes" min="0" max="59" placeholder="00" />
        </div>
        <div class="manual-field">
          <label>Seconds</label>
          <input type="number" id="m-seconds" min="0" max="59" placeholder="00" />
        </div>
        <button class="btn add" id="addManual">Add</button>
      </div>
      <div id="manual-error"></div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'stopwatch_runs';

    let running = false, startTime = 0, elapsed = 0, interval = null;
    let runs = loadRuns();

    const timeEl       = document.getElementById('time');
    const startStopBtn = document.getElementById('startStop');
    const resetBtn     = document.getElementById('reset');
    const statusDot    = document.getElementById('status');
    const runList      = document.getElementById('run-list');
    const totalTimeEl  = document.getElementById('total-time');
    const clearAllBtn  = document.getElementById('clearAll');
    const emptyMsg     = document.getElementById('empty-msg');
    const totalRow     = document.getElementById('total-row');
    const addManualBtn = document.getElementById('addManual');
    const mHours       = document.getElementById('m-hours');
    const mMinutes     = document.getElementById('m-minutes');
    const mSeconds     = document.getElementById('m-seconds');
    const manualError  = document.getElementById('manual-error');

    const pad = n => String(n).padStart(2, '0');

    function fmt(ms) {
      const t = Math.floor(ms / 1000);
      return `${pad(Math.floor(t/3600))}:${pad(Math.floor(t/60)%60)}:${pad(t%60)}`;
    }
    function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
    function fmtDate(d) { return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }

    function loadRuns() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        return JSON.parse(raw).map(r => ({ ...r, start: new Date(r.start), end: new Date(r.end) }));
      } catch { return []; }
    }

    function saveRuns() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(runs)); }
      catch(e) { console.warn('localStorage unavailable:', e); }
    }

    function renderHistory() {
      runList.innerHTML = '';

      if (runs.length === 0) {
        totalRow.style.display = 'none';
        emptyMsg.style.display = 'block';
        return;
      }

      totalRow.style.display = '';
      emptyMsg.style.display = 'none';
      totalTimeEl.textContent = fmt(runs.reduce((s, r) => s + r.ms, 0));

      [...runs].reverse().forEach((r, i) => {
        const realIdx = runs.length - 1 - i; // index in original array
        const displayIdx = runs.length - i;

        const row = document.createElement('div');
        row.className = 'run-row';

        const rangeStr = r.manual
          ? `<span style="color:#aaa;font-size:0.8em;letter-spacing:0.05em">manually added</span>`
          : `${fmtDate(r.start)} ${fmtTime(r.start)} → ${fmtTime(r.end)}`;

        row.innerHTML = `
          <span class="run-index">#${displayIdx}</span>
          <span class="run-range">${rangeStr}</span>
          <span class="run-duration">${fmt(r.ms)}</span>
          <button class="btn-del" data-idx="${realIdx}" title="Remove">✕</button>
        `;
        runList.appendChild(row);
      });

      // bind delete buttons
      runList.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', () => {
          runs.splice(Number(btn.dataset.idx), 1);
          saveRuns();
          renderHistory();
        });
      });
    }

    function update() {
      elapsed = Date.now() - startTime;
      const t = fmt(elapsed);
      timeEl.textContent = t;
      document.title = t + ' — Stopwatch';
    }

    startStopBtn.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now() - elapsed;
        running   = true;
        startStopBtn.textContent = 'Pause';
        statusDot.classList.add('running');
        interval = setInterval(update, 500);
        update();
      } else {
        running = false;
        clearInterval(interval);
        startStopBtn.textContent = 'Resume';
        statusDot.classList.remove('running');
      }
    });

    resetBtn.addEventListener('click', () => {
      if (elapsed === 0) return;
      const endDate   = new Date();
      const startDate = new Date(endDate.getTime() - elapsed);
      runs.push({ start: startDate, end: endDate, ms: elapsed, manual: false });
      saveRuns();
      running = false;
      clearInterval(interval);
      elapsed = 0;
      timeEl.textContent       = '00:00:00';
      startStopBtn.textContent = 'Start';
      statusDot.classList.remove('running');
      document.title           = '00:00:00 — Stopwatch';
      renderHistory();
    });

    clearAllBtn.addEventListener('click', () => {
      runs = [];
      saveRuns();
      renderHistory();
    });

    // ── Manual add ──
    addManualBtn.addEventListener('click', () => {
      manualError.textContent = '';
      const h = parseInt(mHours.value)   || 0;
      const m = parseInt(mMinutes.value) || 0;
      const s = parseInt(mSeconds.value) || 0;

      if (h === 0 && m === 0 && s === 0) {
        manualError.textContent = 'Please enter a time greater than zero.';
        return;
      }
      if (m > 59 || s > 59) {
        manualError.textContent = 'Minutes and seconds must be between 0 and 59.';
        return;
      }

      const ms = (h * 3600 + m * 60 + s) * 1000;
      runs.push({ start: new Date(), end: new Date(), ms, manual: true });
      saveRuns();
      renderHistory();

      mHours.value = '';
      mMinutes.value = '';
      mSeconds.value = '';
    });

    // allow Enter key in manual inputs
    [mHours, mMinutes, mSeconds].forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.code === 'Enter') addManualBtn.click(); });
    });

    window.addEventListener('beforeunload', e => {
      if (running) { e.preventDefault(); e.returnValue = ''; }
    });

    document.addEventListener('keydown', e => {
      const active = document.activeElement;
      const typing = active && (active.tagName === 'INPUT');
      if (typing) return;
      if (e.code === 'Space') { e.preventDefault(); startStopBtn.click(); }
      if (e.code === 'KeyR')  resetBtn.click();
    });

    renderHistory();
  </script>
</body>
</html>
